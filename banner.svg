<svg width="100%" height="200" viewBox="0 0 1200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b8fd6">
        <animate attributeName="stop-color"
          values="#3b8fd6;#7dd3fc;#3b8fd6"
          dur="4s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#7dd3fc">
        <animate attributeName="stop-color"
          values="#7dd3fc;#3b8fd6;#7dd3fc"
          dur="4s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
  </defs>

  <rect width="1200" height="200" fill="url(#bgGradient)" rx="0"/>

  <text x="600" y="95" text-anchor="middle" font-family="Segoe UI, Verdana, sans-serif"
        font-size="46" font-weight="700" fill="#ffffff" opacity="0">
    Prakash Kavyaraj
    <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.1;0.4;1" dur="2.5s" fill="freeze"/>
  </text>

  <text x="600" y="135" text-anchor="middle" font-family="Segoe UI, Verdana, sans-serif"
        font-size="19" fill="#0d2b3e" opacity="0">
    CS &amp; Business Systems Student | C++ Developer | Frontend Enthusiast
    <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.45;0.75;1" dur="3s" fill="freeze"/>
  </text>

  <rect x="450" y="150" width="3" height="26" fill="#0d2b3e">
    <animate attributeName="opacity" values="1;0;1" dur="0.9s" repeatCount="indefinite"/>
  </rect>
</svg>
